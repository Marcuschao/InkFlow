name: Backend CI

on:
  push:
    branches: [master, main]
    paths:
      - 'personal-blog-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'personal-blog-backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Test
        run: mvn -B -f personal-blog-backend/pom.xml test
        env:
          SPRING_PROFILES_ACTIVE: test
      - name: Package
        run: mvn -B -f personal-blog-backend/pom.xml package -DskipTests
