spring:
  task:
    scheduling:
      enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
  datasource:
    url: jdbc:h2:mem:blog_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: ''
    password: ''
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  ai:
    openai:
      api-key: test-key
      base-url: http://127.0.0.1:9
      chat:
        options:
          model: test

blog:
  notification:
    enabled: false
  chat:
    fanout-enabled: false
  rate-limit:
    enabled: false

minio:
  enabled: false

management:
  server:
    port: 0

logging:
  level:
    root: WARN
    com.blog.personalblogbackend: WARN
