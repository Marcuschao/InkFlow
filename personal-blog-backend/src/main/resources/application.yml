server:
  port: 8080
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jackson:
    time-zone: Asia/Shanghai
  data:
    redis:
      lettuce:
        shutdown-timeout: 200ms
  security:
    jwt:
      secret: YourSecretKeyForJWTGenerationAndValidation1234567890
      expiration: 43200
      remember-me-expiration: 604800
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  profiles:
    active: local

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,env
  endpoint:
    health:
      show-details: when_authorized

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml # Mapper XML 
  global-config:
    db-config:
      id-type: auto 
      logic-delete-field: deleted 
      logic-not-delete-value: 0
      logic-delete-value: 1
      table-underline: true 
  configuration:
    map-underscore-to-camel-case: true 

blog:
  chat:
    guest-readonly: true
    history-limit: 50
    history-page-size: 30
    online-ttl-seconds: 90
    archive-hot-days: 7
    archive-batch-size: 1000
    archive-cron: "0 0 1 * * ?"
  websocket:
    endpoint: /ws
    heartbeat: 10000
  cache:
    l1-max-size: 1000
    l1-write-ttl-minutes: 5
    null-ttl-seconds: 30
    list-cache-max-page: 3
    evict-delay-ms: 500
  content:
    exchange: blog.content
    queue: content.cache.queue
    routing-key: content.change
  datasource:
    read-url: ${spring.datasource.url}
    write-url: ${spring.datasource.url}
  site-base-path: ""
  notify-mail-enabled: false
  notify-from: ""
  notification:
    enabled: true
    dead-letter-enabled: true
    exchange: blog.notification
    inbox-queue: notification.queue
    push-queue: notification.push.queue
    mail-queue: notification.mail.queue
    audit-queue: notification.audit.queue

app:
  upload-dir: upload

resilience4j:
  circuitbreaker:
    instances:
      aiService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3