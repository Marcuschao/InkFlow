server:
  port: 8080
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jackson:
    time-zone: Asia/Shanghai
  data:
    redis:
      lettuce:
        shutdown-timeout: 200ms
  security:
    jwt:
      secret: YourSecretKeyForJWTGenerationAndValidation1234567890
      expiration: 43200
      remember-me-expiration: 604800
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  profiles:
    active: local
  rabbitmq:
    listener:
      simple:
        mismatched-queues-fatal: false

logging:
  level:
    root: WARN
    com.blog.personalblogbackend: INFO

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: personal-blog-backend
    distribution:
      percentiles-histogram:
        blog.http.server.requests: true

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml # Mapper XML 
  global-config:
    db-config:
      id-type: auto 
      logic-delete-field: deleted 
      logic-not-delete-value: 0
      logic-delete-value: 1
      table-underline: true 
  configuration:
    map-underscore-to-camel-case: true 

blog:
  interaction:
    idempotency-ttl-seconds: 60
    flush-interval-seconds: 30
    redis-count-enabled: true
    sync-fallback: true
    exchange: blog.interaction
    queue: interaction.persist.queue
    routing-key: interaction.persist
  chat:
    fanout-enabled: true
    fanout-stream-key: chat:stream:room
    fanout-group: chat-fanout-group
    fanout-max-len: 10000
    guest-readonly: true
    history-limit: 50
    history-page-size: 30
    online-ttl-seconds: 90
    archive-hot-days: 7
    archive-batch-size: 1000
    archive-cron: "0 0 1 * * ?"
  websocket:
    endpoint: /ws
    heartbeat: 10000
  cache:
    l1-max-size: 1000
    l1-write-ttl-minutes: 5
    null-ttl-seconds: 30
    list-cache-max-page: 3
    evict-delay-ms: 500
  hot-search:
    cache-ttl-minutes: 5
    connect-timeout-seconds: 5
    read-timeout-seconds: 10
    home-preview-size: 5
  rate-limit:
    enabled: true
    article-detail-per-minute: 120
    article-list-per-minute: 180
    api-get-per-minute: 300
    api-write-per-minute: 30
    admin-per-minute: 120
    stat-view-per-minute: 300
  content:
    exchange: blog.content
    queue: content.cache.queue
    routing-key: content.change
  search:
    enabled: false
    host: http://127.0.0.1:7700
    api-key: ${MEILI_MASTER_KEY:}
    index: articles
    exchange: blog.search
    queue: search.sync.queue
    routing-key: search.sync
    outbox:
      poll-interval-ms: 5000
      batch-size: 100
      max-retries: 10
    reconcile:
      cron: "0 30 4 * * ?"
      batch-size: 500
  oauth:
    enabled: false
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:}
    frontend-callback-url: http://localhost:5173/oauth/callback
  datasource:
    read-url: ${spring.datasource.url}
    write-url: ${spring.datasource.url}
  site-base-path: ""
  notify-mail-enabled: false
  notify-from: ""
  notification:
    enabled: true
    idempotency-ttl-days: 7
    # 已有队列无 DLX 时须为 false；改为 true 前需在 RabbitMQ 删除 notification.* / content.cache.queue 等旧队列
    dead-letter-enabled: true
    exchange: blog.notification
    inbox-queue: notification.queue
    push-queue: notification.push.queue
    mail-queue: notification.mail.queue
    audit-queue: notification.audit.queue

app:
  upload-dir: upload

resilience4j:
  circuitbreaker:
    instances:
      aiService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3