server:
  port: 8083

spring:
  application:
    name: blog-content
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        fail-fast: false

management:
  server:
    port: 9083
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

blog:
  search:
    enabled: true
