server:
  port: 8083

spring:
  application:
    name: blog-content
  profiles:
    active: local
  cloud:
    nacos:
      discovery:
        fail-fast: false
        register-enabled: true
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        ip-delete-timeout: 30000

management:
  server:
    port: 9083
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

blog:
  search:
    enabled: true
  knowledge:
    cooccurrence-cron: "0 0 2 * * ?"
    hotness-cron: "0 0 * * * ?"
    decay-lambda: 0.01
    max-edges: 500
    graph-cache-ttl-hours: 25
    auto-tag-enabled: false
